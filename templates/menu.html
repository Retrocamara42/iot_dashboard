<!DOCTYPE html>
{% load static %}
<html>
<head>
   <meta charset="utf-8">
   <title>{% block title %}No title{% endblock %}</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
   <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous"/>
   <link rel="stylesheet" href="{% static 'css/menu.css' %}">
   <link rel="stylesheet" href="{% static 'css/notifications.css' %}">
   <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/moment"></script>
   <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment"></script>
</head>
<body>
   <div class="notify" id="notifyType"><span id="notification"></span></div>
   <div id="viewport">
     <!-- Sidebar -->
     <div id="sidebar">
       <header>
         <a href="#"><i class="fas fa-bars"></i>Multisensor</a>
       </header>
       <ul class="nav">
         <li class="nav-item nav-expandable nav-closed">
            <div><i class="fas fa-thermometer-half"></i>Monitor de ambiente</div>
            <ul class="sub-nav">
               <li class="nav-sub-item">
                  <div onclick="location.href='/environment_monitor/dashboard/'"
                  ><i class="fas fa-chart-line"></i>Dashboard</div>
               </li>
               <li class="nav-sub-item">
                  <div onclick="location.href='/environment_monitor/control/'"
                  ><i class="fas fa-satellite-dish"></i>Control</div>
               </li>
            </ul>
         </li>
         <li class="nav-item nav-expandable nav-closed">
            <div onclick="location.href='/sound_recorder/home/'"
            ><i class="fas fa-headphones-alt"></i>Grabador de audio</div>
         </li>
         <li class="nav-item nav-closed">
            <div onclick="changeColor()"
            ><i class="fas fa-paint-roller"></i>Cambiar color</div>
         </li>
       </ul>
     </div>
     <!-- Content -->
     <div id="content">
        {% block content %}{% endblock %}
    </div>
   </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/js-cookie@rc/dist/js.cookie.min.js"></script>
<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script src="{% static 'js/change_color.js' %}"></script>
<script src="{% static 'js/menu.js' %}"></script>
{% block extra_js %}{% endblock %}
</html>
