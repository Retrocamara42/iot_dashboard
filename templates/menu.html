<!DOCTYPE html>
{% load static %}
<html>
<head>
   <meta charset="utf-8">
   <title>{% block title %}No title{% endblock %}</title>
   <!-- icon -->
   <link rel="apple-touch-icon" sizes="180x180" href="{% static 'resources/favicon/apple-touch-icon.png' %}">
   <link rel="icon" type="image/png" sizes="32x32" href="{% static 'resources/favicon/favicon-32x32.png' %}">
   <link rel="icon" type="image/png" sizes="16x16" href="{% static 'resources/favicon/favicon-16x16.png' %}">
   <link rel="manifest" href="{% static 'resources/favicon/site.webmanifest' %}">
   <link rel="mask-icon" href="{% static 'resources/favicon/safari-pinned-tab.svg' %}" color="#5bbad5">
   <meta name="msapplication-TileColor" content="#da532c">
   <meta name="theme-color" content="#ffffff">
   <!-- end icon -->
   <!-- css -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
   <link rel="stylesheet" href="{% static 'css/menu.css' %}">
   <link rel="stylesheet" href="{% static 'css/notifications.css' %}">
   <!-- end css -->
   <!-- chart js -->
   <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
   <script src="https://cdn.jsdelivr.net/npm/moment"></script>
   <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment"></script>
   <!-- end chart js -->
</head>
<body>
   <div class="notify" id="notifyType"><span id="notification"></span></div>
   <div id="viewport">
     <!-- Sidebar -->
   <aside id="sidebar" class="sidebar">
    <h2 class="logo">🐹 La Madriguera</h2>
    <nav>
      <ul>
        <li id="start" class="active"><div
            onclick="location.href='/'"
            ><i class="fas fa-house-user"></i>Página de inicio</div>
         </li>
        <li id="dashboard"><div
            onclick="location.href='/dashboard'"><i class="fas fa-chart-line"></i>Dashboard</div>
        </li>
        <li id="devices"><div
            onclick="location.href='/devices'"
            ><i class="fas fa-laptop-house"></i>Dispositivos</div>
         </li>
      </ul>
    </nav>
  </aside>

     <!-- Content -->
     <div id="content">
        {% block content %}{% endblock %}
    </div>
   </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/js-cookie@rc/dist/js.cookie.min.js"></script>
<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
{% block extra_js %}{% endblock %}
<script src="{% static 'js/change_color.js' %}"></script>
<script src="{% static 'js/menu.js' %}"></script>
</html>
